services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: x402_scheduler_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    volumes:
      - ./scheduler/app:/app
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://scheduler:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - scheduler

volumes:
  postgres_data:
  frontend_modules:
